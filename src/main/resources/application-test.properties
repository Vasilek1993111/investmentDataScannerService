# ===========================================
# ТЕСТОВОЕ ОКРУЖЕНИЕ (TEST ENVIRONMENT)
# ===========================================
# Используется для тестирования и разработки
# Подключается к тестовой базе данных
# Использует тестовый токен Tinkoff API

# ===========================================
# СЕРВЕР И ПОРТЫ
# ===========================================
server.port=8088

# ===========================================
# TINKOFF API - ТЕСТОВЫЙ ТОКЕН
# ===========================================
# Использует тестовый токен для безопасного тестирования
tinkoff.api.token=${T_INVEST_TEST_TOKEN:t.test-token}
tinkoff.api.timeout=30000

# ===========================================
# SECURITY - ТЕСТОВЫЕ УЧЕТНЫЕ ДАННЫЕ
# ===========================================
app.security.username=${APP_SECURITY_USERNAME:test-admin}
app.security.password=${APP_SECURITY_PASSWORD:test-password-change-me}

# ===========================================
# БАЗА ДАННЫХ - ТЕСТОВАЯ
# ===========================================
# По умолчанию используем in-memory H2, чтобы тесты были воспроизводимыми без внешней БД.
spring.datasource.url=${SPRING_DATASOURCE_TEST_URL:jdbc:h2:mem:investment-scanner-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_TEST_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_TEST_PASSWORD:}
spring.datasource.driver-class-name=org.h2.Driver

# Пул соединений для тестового окружения (меньше ресурсов)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.max-lifetime=900000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.leak-detection-threshold=60000

# ===========================================
# JPA / HIBERNATE - ТЕСТОВЫЕ НАСТРОЙКИ
# ===========================================
# Для in-memory БД поднимаем схему автоматически на время теста
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Отключаем валидацию схемы для избежания проблем с соединениями
spring.jpa.properties.hibernate.hbm2ddl.auto=create-drop
spring.jpa.properties.hibernate.hbm2ddl.validate=false

# Оптимизация для тестов
spring.jpa.properties.hibernate.jdbc.batch_size=25

# Отключаем подробное логирование SQL для уменьшения логов
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false

# Настройки транзакций для тестов
spring.transaction.default-timeout=60
spring.batch.jdbc.initialize-schema=never

# ===========================================
# ЛОГИРОВАНИЕ - УМЕРЕННОЕ ДЛЯ ТЕСТОВ
# ===========================================
# Логирование настроено через logback-spring.xml
# Уровни логирования и appenders настраиваются в logback-spring.xml
# Для тестового окружения логи пишутся в logs/test/current/ и logs/test/history/
# Консольный вывод включен для тестового профиля

# ===========================================
# DEVTOOLS - ВКЛЮЧЕНЫ ДЛЯ РАЗРАБОТКИ
# ===========================================
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
spring.devtools.restart.poll-interval=1000
spring.devtools.restart.quiet-period=400
spring.devtools.restart.exclude=static/**,public/**,resources/**

# ===========================================
# ТЕСТОВЫЕ НАСТРОЙКИ
# ===========================================
# Отключаем кеширование для тестов
spring.cache.type=none

# Настройки для тестовых данных
app.test.mode=true
app.test.data.cleanup=true

# ===========================================
# SCHEDULER - ТЕСТОВЫЕ НАСТРОЙКИ
# ===========================================
# Отключаем планировщик в тестовом окружении
spring.task.scheduling.enabled=false

# ===========================================
# QUOTE SCANNER - ТЕСТОВЫЕ НАСТРОЙКИ
# ===========================================
quote-scanner.enable-database-saving=true
quote-scanner.max-quotes-per-second=1000
startup.price-loader.enabled=false
startup.instrument-loader.enabled=false

# ===========================================
# ACTUATOR - ТЕСТОВЫЕ НАСТРОЙКИ
# ===========================================
management.endpoint.health.show-details=when_authorized
management.endpoints.web.exposure.include=health,info
