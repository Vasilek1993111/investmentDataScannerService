<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Investment Data Scanner</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .login-card {
            width: min(420px, calc(100vw - 32px));
            background: #fff;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.2);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 28px;
        }

        p {
            margin: 0 0 24px;
            color: #666;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d0d7de;
            border-radius: 10px;
            box-sizing: border-box;
            margin-bottom: 16px;
            font-size: 15px;
        }

        button {
            width: 100%;
            border: none;
            border-radius: 10px;
            padding: 12px 14px;
            background: #667eea;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #5a6fd8;
        }

        .message {
            margin-bottom: 16px;
            padding: 12px 14px;
            border-radius: 10px;
            display: none;
        }

        .message.error {
            display: block;
            background: #f8d7da;
            color: #842029;
        }

        .message.info {
            display: block;
            background: #cff4fc;
            color: #055160;
        }

        .hint {
            margin-top: 16px;
            font-size: 13px;
            color: #777;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Вход в систему</h1>
        <p>Доступ к API и WebSocket теперь защищен авторизацией.</p>

        <div id="message" class="message"></div>

        <form method="post" action="/login">
            <label for="username">Логин</label>
            <input id="username" name="username" type="text" autocomplete="username" required>

            <label for="password">Пароль</label>
            <input id="password" name="password" type="password" autocomplete="current-password"
                required>

            <button type="submit">Войти</button>
        </form>

        <div class="hint">
            Учетные данные задаются через переменные окружения
            <code>APP_SECURITY_USERNAME</code> и <code>APP_SECURITY_PASSWORD</code>.
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const messageEl = document.getElementById('message');

        if (params.has('error')) {
            messageEl.textContent = 'Неверный логин или пароль.';
            messageEl.className = 'message error';
        } else if (params.has('logout')) {
            messageEl.textContent = 'Вы вышли из системы.';
            messageEl.className = 'message info';
        }
    </script>
</body>
</html>
